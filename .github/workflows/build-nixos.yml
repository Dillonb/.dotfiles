name: Build NixOS systems

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Shared config, kept here so it is easy to update in one place.
env:
  RUNNER_X86: ubuntu-latest
  RUNNER_ARM: ubuntu-24.04-arm
  RUNNER_MACOS: macos-latest
  ATTIC_ENDPOINT: https://attic.dgb.sh/
  ATTIC_CACHE: system
  ATTIC_PUBLIC_KEY: system:E5ubGe/xsSF5nf2gxvZBP4WSVVFWis3lo+3A3HERoxc=
  ALTERNATE_CACHE_ENDPOINT: https://cache.nix.dgb.sh
  ALTERNATE_CACHE_PUBLIC_KEY: cache.nix.dgb.sh:XzJS7VYoZ90T3fwKySBAqfKdxViX6zk2PJvlKVD+euU=

jobs:
  # Generate the build matrix from the flake so it always tracks the nixos/darwin
  # configurations. Each entry carries the attr to build, its (deterministic)
  # output path, and a runner routed by platform.
  matrix:
    name: Generate matrix
    runs-on: ubuntu-latest
    outputs:
      include: ${{ steps.generate.outputs.include }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          extra-conf: access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Generate matrix
        id: generate
        run: |
          INCLUDE=$(nix eval --json --impure --expr '
            let
              flake = builtins.getFlake (toString ./.);
              runnerFor = system:
                if system == "aarch64-linux" then "${{ env.RUNNER_ARM }}"
                else if system == "x86_64-linux" then "${{ env.RUNNER_X86 }}"
                else "${{ env.RUNNER_MACOS }}";
              nixos = map (name:
                let c = flake.nixosConfigurations.${name}; in {
                  inherit name;
                  target = ".#nixosConfigurations.${name}.config.system.build.toplevel";
                  path = c.config.system.build.toplevel.outPath;
                  runner = runnerFor c.config.nixpkgs.system;
                }) (builtins.attrNames flake.nixosConfigurations);
              darwin = map (name:
                let c = flake.darwinConfigurations.${name}; in {
                  inherit name;
                  target = ".#darwinConfigurations.${name}.system";
                  path = c.system.outPath;
                  runner = runnerFor c.config.nixpkgs.system;
                }) (builtins.attrNames (flake.darwinConfigurations or {}));
            in
            nixos ++ darwin
          ')
          echo "include=$INCLUDE" >> "$GITHUB_OUTPUT"
          echo "$INCLUDE" | nix run nixpkgs#jq -- .

  build:
    name: Build ${{ matrix.name }}
    needs: matrix
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.runner }}
    env:
      ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: thiagokokada/free-disk-space@main
        with:
          tool-cache: true
          opt: true
          usrlocal: true
          usrmisc: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@main
        with:
          # Pull unchanged paths from the self-hosted caches so each run only
          # builds what actually changed.
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = ${{ env.ATTIC_ENDPOINT }}${{ env.ATTIC_CACHE }} ${{ env.ALTERNATE_CACHE_ENDPOINT }}
            extra-trusted-public-keys = ${{ env.ATTIC_PUBLIC_KEY }} ${{ env.ALTERNATE_CACHE_PUBLIC_KEY }}

      # Only authenticate to attic when the push token is available (i.e. not on
      # pull requests from forks). Builds still run and verify without it.
      - name: Set up attic cache
        if: env.ATTIC_TOKEN != ''
        uses: ryanccn/attic-action@v0.5.0
        with:
          endpoint: ${{ env.ATTIC_ENDPOINT }}
          cache: ${{ env.ATTIC_CACHE }}
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Build ${{ matrix.name }}
        run: nix build -L --show-trace "${{ matrix.target }}"

  publish:
    name: Publish store-path manifest
    needs: [matrix, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Assemble systems.json
        run: |
          echo '${{ needs.matrix.outputs.include }}' \
            | jq 'map({(.name): .path}) | add' | tee systems.json

      - name: Publish release asset
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create latest --title latest \
            --notes "Latest built NixOS system store paths" 2>/dev/null || true
          gh release upload latest systems.json --clobber
