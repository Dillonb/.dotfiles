name: Build NixOS systems

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ATTIC_ENDPOINT: https://attic.dgb.sh/
  ATTIC_CACHE: system
  ATTIC_PUBLIC_KEY: system:E5ubGe/xsSF5nf2gxvZBP4WSVVFWis3lo+3A3HERoxc=
  ALTERNATE_CACHE_ENDPOINT: https://cache.nix.dgb.sh
  ALTERNATE_CACHE_PUBLIC_KEY: cache.nix.dgb.sh:XzJS7VYoZ90T3fwKySBAqfKdxViX6zk2PJvlKVD+euU=

jobs:
  # Generate the build matrix from the flake so it always tracks the nixos/darwin
  # configurations. Each entry carries the attr to build, its (deterministic)
  # output path, and a runner routed by platform.
  matrix:
    name: Generate matrix
    runs-on: ubuntu-latest
    env:
      ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
    outputs:
      include: ${{ steps.generate.outputs.include }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = ${{ env.ATTIC_ENDPOINT }}${{ env.ATTIC_CACHE }} ${{ env.ALTERNATE_CACHE_ENDPOINT }}
            extra-trusted-public-keys = ${{ env.ATTIC_PUBLIC_KEY }} ${{ env.ALTERNATE_CACHE_PUBLIC_KEY }}
      - name: Set up attic cache
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/master'
          && env.ATTIC_TOKEN != ''
        uses: ryanccn/attic-action@v0.5.0
        with:
          endpoint: ${{ env.ATTIC_ENDPOINT }}
          cache: ${{ env.ATTIC_CACHE }}
          token: ${{ secrets.ATTIC_TOKEN }}
      - name: Check flake
        run: nix flake check --all-systems -v
      - name: Generate matrix
        id: generate
        run: |
          base=$(nix eval --raw .#github-actions-matrix)
          # Build only the systems whose output path isn't already in attic.
          store="${{ env.ATTIC_ENDPOINT }}${{ env.ATTIC_CACHE }}"
          include='[]'
          while read -r entry; do
            path=$(jq -r '.path' <<<"$entry")
            if nix path-info --store "$store" "$path" >/dev/null 2>&1; then
              echo "✔ cached, skipping: $path"
            else
              echo "building: $path"
              include=$(jq -c --argjson e "$entry" '. + [$e]' <<<"$include")
            fi
          done < <(jq -c '.[]' <<<"$base")
          echo "include=$include" >> "$GITHUB_OUTPUT"
          jq . <<<"$include"

  build:
    name: Build ${{ matrix.name }}
    needs: matrix
    if: ${{ needs.matrix.outputs.include != '[]' }}
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.matrix.outputs.include) }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: write
    env:
      ATTIC_TOKEN: ${{ secrets.ATTIC_TOKEN }}
    steps:
      - name: Check out source
        uses: actions/checkout@v7

      - name: Free disk space
        if: runner.os == 'Linux'
        uses: thiagokokada/free-disk-space@d3e470a0e298133572dc766e6b10d5a51c71c0e3 # Dec 10, 2025
        with:
          tool-cache: true
          opt: true
          usrlocal: true
          usrmisc: true

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
            extra-substituters = ${{ env.ATTIC_ENDPOINT }}${{ env.ATTIC_CACHE }} ${{ env.ALTERNATE_CACHE_ENDPOINT }}
            extra-trusted-public-keys = ${{ env.ATTIC_PUBLIC_KEY }} ${{ env.ALTERNATE_CACHE_PUBLIC_KEY }}

      - name: Set up attic cache
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/master'
          && env.ATTIC_TOKEN != ''
        uses: ryanccn/attic-action@v0.5.0
        with:
          endpoint: ${{ env.ATTIC_ENDPOINT }}
          cache: ${{ env.ATTIC_CACHE }}
          token: ${{ secrets.ATTIC_TOKEN }}

      - name: Monitor nix store
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/master'
          && env.ATTIC_TOKEN != ''
        run: nohup attic watch-store "$ATTIC_CACHE" &

      - name: Build ${{ matrix.name }}
        run: |
          nix build -L --show-trace ".#devShells.$(nix eval --impure --raw --expr builtins.currentSystem).default"
          nix build -L --show-trace "${{ matrix.target }}"

      - name: Publish ${{ matrix.name }} release
        if: >-
          github.event_name == 'push' && github.ref == 'refs/heads/master'
          && env.ATTIC_TOKEN != ''
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          tag='system-${{ matrix.name }}'
          printf '%s\n' '${{ matrix.path }}' > store-path

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" store-path --clobber
            gh api --method PATCH "repos/$GH_REPO/git/refs/tags/$tag" \
              -f sha="$GITHUB_SHA" -F force=true >/dev/null
          else
            gh release create "$tag" store-path \
              --target "$GITHUB_SHA" \
              --title "${{ matrix.name }}" \
              --notes "Latest successful ${{ matrix.name }} system build"
          fi
